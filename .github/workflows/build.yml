name: Build for commit

on:
  push:
  workflow_dispatch:

env:
  rust_toolchain: stable

permissions:
  contents: write

jobs:
  compile:
    # strategy:
    #   fail-fast: true
    # matrix:
    #   debug_enabled: [true, false]
    name: Compile
    runs-on: ubuntu-latest

    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v5

      ################
      # Frontend build
      ################

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: firmware/src/tasks/http/frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: firmware/src/tasks/http/frontend
        run: pnpm ci --ignore-scripts
      - name: Build frontend
        working-directory: firmware/src/tasks/http/frontend
        run: pnpm build

      ################
      # Rust Setup
      ################

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          target: riscv32imc-unknown-none-elf
      - name: Install Cargo-Bininstall
        uses: cargo-bins/cargo-binstall@main
      - name: Install ESPflash
        run: cargo binstall espflash@=4.4.0 --no-confirm --force
      - name: Enable caching
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware

      ################
      # SETUP RCLONE
      ################

      - name: Extract Data
        id: extract_version
        run: |
          # Remove the "v" prefix if present
          BASE_VERSION="${{ github.ref_name }}"
          VERSION=${BASE_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "sha_short=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
          echo "branch=$(echo ${GITHUB_REF#refs/heads/})" >> "$GITHUB_ENV"
      - name: Install Rclone
        run: curl https://rclone.org/install.sh | sudo bash
      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone

          cat > ~/.config/rclone/rclone.conf <<EOF
          [garage]
          type = s3
          provider = Other
          access_key_id = ${{ secrets.MINIO_ACCESS_KEY }}
          secret_access_key = ${{ secrets.MINIO_SECRET_KEY }}
          endpoint = ${{ secrets.MINIO_ENDPOINT }}
          region = us-east-1
          force_path_style = true
          signature_v2 = True
          EOF

      - name: Build | Compile (production)
        run: |
          export VERSION=${BRANCH}@${SHA_SHORT}
          cargo build -p firmware --release
        env:
          BRANCH: ${{ env.branch }}
          SHA_SHORT: $${{ env.sha_short }}

      - name: Merge Binary
        run: espflash save-image --merge --chip esp32c3 target/riscv32imc-unknown-none-elf/release/firmware td-free.bin
        ################
        # UPLOAD ARTIFACT
        ################
      - name: Upload file
        run: |
          rclone copyto td-free.bin garage:${{ secrets.S3_BUCKET }}/${{ env.branch }}/td-free_${{ env.sha_short }}.bin
          rclone copyto td-free.bin garage:${{ secrets.S3_BUCKET }}/${{ env.branch }}/td-free_latest.bin
      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: td-free.bin
